<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050816">

  <meta name="description"
        content="AI Powered Customer Churn Prediction Dashboard">

  <meta name="author"
        content="Rohit Dusane">

  <title>
  {% block title %}
  ChurnIQ — Customer Churn Prediction
  {% endblock %}
  </title>

  <meta name="description"
  content="{% block description %}
  AI Customer Churn Prediction Platform
  {% endblock %}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
  <!-- <link rel="stylesheet" href="/static/css/base.css"> -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">
    <div class="nav-logo">CI</div>
    ChurnIQ
  </a>
  <div class="nav-links">
    <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Home
    </a>
    <a class="nav-link {% if request.url.path == '/predict' %}active{% endif %}" href="/predict">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Predict
    </a>
    <a class="nav-link {% if request.url.path == '/about' %}active{% endif %}" href="/about">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      About
    </a>
    <a class="nav-cta" href="/predict">Run Prediction</a>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="site-footer">
  ChurnIQ v2.0 — Built with FastAPI + XGBoost &nbsp;|&nbsp;
  <a href="/health">API Status</a> &nbsp;|&nbsp;
  Made by <a href="https://github.com/RohitDusane" target="_blank">Rohit Dusane</a>
</footer>

<div class="toast" id="global-toast"></div>

<script>
function showToast(msg, type='success'){
  const t = document.getElementById('global-toast');
  t.textContent = msg;
  t.style.background = type === 'error'
    ? 'rgba(239,68,68,.2)' : 'rgba(16,185,129,.2)';
  t.style.borderColor = type === 'error'
    ? 'rgba(239,68,68,.4)' : 'rgba(16,185,129,.4)';
  t.style.color = type === 'error' ? '#EF4444' : '#10B981';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

// Slider gradient track updater
function updateSlider(el){
  const min = +el.min, max = +el.max, val = +el.value;
  const pct = ((val - min)/(max - min))*100;
  el.style.setProperty('--pct', pct+'%');
}
document.querySelectorAll('input[type=range]').forEach(s=>{
  updateSlider(s);
  s.addEventListener('input', ()=>updateSlider(s));
});

// Toggle pill handler
document.querySelectorAll('.toggle-pill').forEach(pill=>{
  pill.querySelectorAll('.toggle-opt').forEach(opt=>{
    opt.addEventListener('click', ()=>{
      pill.querySelectorAll('.toggle-opt').forEach(o=>o.classList.remove('sel'));
      opt.classList.add('sel');
      const hidden = pill.nextElementSibling;
      if(hidden && hidden.classList.contains('toggle-hidden'))
        hidden.value = opt.dataset.val;
    });
  });
});
</script>
{% block extra_script %}{% endblock %}
</body>
</html>
